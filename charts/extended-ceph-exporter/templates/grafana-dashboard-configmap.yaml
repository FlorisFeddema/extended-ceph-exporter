{{- if .Values.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "extended-ceph-exporter.fullname" . }}-grafana-dashboard
  labels:
    {{- include "extended-ceph-exporter.labels" . | nindent 4 }}
    {{- with .Values.grafanaDashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.grafanaDashboard.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  extended-ceph-exporter-rgw-overview.json: |-
{{ include "extended-ceph-exporter.grafanaDashboard" . | indent 4 }}
{{- end }}
