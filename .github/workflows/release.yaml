name: Release

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CHART_PATH: charts/extended-ceph-exporter

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare release variables
        id: prep
        shell: bash
        run: |
          set -euo pipefail

          image_repository="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          chart_registry_owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          chart_version="$(sed -n 's/^version: //p' "${CHART_PATH}/Chart.yaml" | head -n1)"

          if [[ -z "${chart_version}" ]]; then
            echo "Unable to determine chart version from ${CHART_PATH}/Chart.yaml" >&2
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            release_version="${GITHUB_REF_NAME}"
            image_tags="${REGISTRY}/${image_repository}:${release_version},${REGISTRY}/${image_repository}:latest"
          else
            release_version="${chart_version}"
            image_tags="${REGISTRY}/${image_repository}:sha-${GITHUB_SHA::12}"
          fi

          echo "chart_version=${chart_version}" >> "${GITHUB_OUTPUT}"
          echo "chart_registry=oci://${REGISTRY}/${chart_registry_owner}/charts" >> "${GITHUB_OUTPUT}"
          echo "image_tags=${image_tags}" >> "${GITHUB_OUTPUT}"
          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"

      - name: Verify tag matches chart version
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ steps.prep.outputs.release_version }}" != "${{ steps.prep.outputs.chart_version }}" ]]; then
            echo "Tag version ${{ steps.prep.outputs.release_version }} does not match chart version ${{ steps.prep.outputs.chart_version }}" >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.prep.outputs.image_tags }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        shell: bash
        run: |
          set -euo pipefail
          helm lint "${CHART_PATH}"

      - name: Log in Helm OCI client to GHCR
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${REGISTRY}" --username "${GITHUB_ACTOR}" --password-stdin

      - name: Package Helm chart
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .dist
          helm package "${CHART_PATH}" --destination .dist

      - name: Publish Helm chart
        shell: bash
        run: |
          set -euo pipefail
          helm push ".dist/extended-ceph-exporter-${{ steps.prep.outputs.chart_version }}.tgz" "${{ steps.prep.outputs.chart_registry }}"
