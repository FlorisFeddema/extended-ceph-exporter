name: Build

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "*.*.*"
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.0"
  CHART_PATH: charts/extended-ceph-exporter

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run gofmt check
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$(gofmt -l .)" ]]; then
            echo "Files are not formatted with gofmt" >&2
            gofmt -l .
            exit 1
          fi

      - name: Run Go tests
        shell: bash
        run: |
          set -euo pipefail
          go test ./...

      - name: Build Go binaries
        shell: bash
        run: |
          set -euo pipefail
          go build ./...

  helm:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        shell: bash
        run: |
          set -euo pipefail
          helm lint "${CHART_PATH}"

      - name: Render Helm chart
        shell: bash
        run: |
          set -euo pipefail
          helm template extended-ceph-exporter "${CHART_PATH}" > /tmp/extended-ceph-exporter-rendered.yaml

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: false
          platforms: linux/amd64
          tags: extended-ceph-exporter:ci
